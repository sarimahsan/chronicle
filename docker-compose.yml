version: '3.8'

services:
  neo4j:
    image: neo4j:5.12.0-community
    container_name: chronicle_neo4j
    ports:
      - "7474:7474" # Neo4j Browser dashboard
      - "7687:7687" # Bolt connection port
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: chronicle_backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CLONE_DIR_BASE=/app/cloned_repos
    volumes:
      - cloned_repos:/app/cloned_repos
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: chronicle_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  cloned_repos:
